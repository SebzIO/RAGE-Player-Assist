name: Build Release Asset

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to upload the built zip to. Leave blank to store only as a workflow artifact.
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Create virtual environment
        shell: pwsh
        run: python -m venv .venv

      - name: Install build dependencies
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Build executable
        shell: pwsh
        run: |
          $env:RPA_RELEASE_TAG = if ("${{ github.event_name }}" -eq "release") { "${{ github.event.release.tag_name }}" } else { "${{ github.event.inputs.release_tag }}" }
          .\build_exe.ps1

      - name: Build MSI installer
        id: build_msi
        shell: pwsh
        run: |
          $env:RPA_RELEASE_TAG = if ("${{ github.event_name }}" -eq "release") { "${{ github.event.release.tag_name }}" } else { "${{ github.event.inputs.release_tag }}" }
          $msiPath = .\build_msi.ps1
          "msi_path=$msiPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Archive portable package
        id: archive_portable
        shell: pwsh
        run: |
          $manualTag = "${{ github.event.inputs.release_tag }}"
          $tagName = if ("${{ github.event_name }}" -eq "release") {
            "${{ github.event.release.tag_name }}"
          } elseif ($manualTag) {
            $manualTag
          } else {
            "manual-build"
          }
          $assetName = "RAGE-Player-Assist-$tagName-portable-windows.zip"
          $packageDir = "dist\RAGE Player Assist"
          $pathsToArchive = @(
            (Join-Path $packageDir "RAGE Player Assist.exe"),
            (Join-Path $packageDir "_internal")
          )
          Compress-Archive -Path $pathsToArchive -DestinationPath $assetName -Force
          "asset_name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Rename MSI asset
        id: rename_msi
        shell: pwsh
        run: |
          $manualTag = "${{ github.event.inputs.release_tag }}"
          $tagName = if ("${{ github.event_name }}" -eq "release") {
            "${{ github.event.release.tag_name }}"
          } elseif ($manualTag) {
            $manualTag
          } else {
            "manual-build"
          }
          $assetName = "RAGE-Player-Assist-$tagName-setup.msi"
          Copy-Item "${{ steps.build_msi.outputs.msi_path }}" $assetName -Force
          "asset_name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload assets to release
        if: github.event_name == 'release' || github.event.inputs.release_tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tagName = if ("${{ github.event_name }}" -eq "release") { "${{ github.event.release.tag_name }}" } else { "${{ github.event.inputs.release_tag }}" }
          gh release upload $tagName "${{ steps.archive_portable.outputs.asset_name }}" "${{ steps.rename_msi.outputs.asset_name }}" --clobber

      - name: Upload workflow artifacts
        if: github.event_name != 'release' && github.event.inputs.release_tag == ''
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: |
            ${{ steps.archive_portable.outputs.asset_name }}
            ${{ steps.rename_msi.outputs.asset_name }}
